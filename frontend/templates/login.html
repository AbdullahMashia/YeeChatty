{% extends "layout.html" %}


{% block title %}
    <link rel="StyleSheet" href="static/css/login.css">
    <title>Login</title>
{% endblock %}

{%block login_status %}
    <a style="color:white" href="/">back</a>
{%endblock%}

{% block body %}
<div id="login_screen">


<h1>Login</h1>
<form>
    <input type="text" required placeholder="username">
    <input type="password" required placeholder="password">
    <button type="submit">login</button>

</form>
<div id="go_to_register">
    <p>I am new here <a href="/register">Register</a></p>
</div>

</div>
{% endblock%}
